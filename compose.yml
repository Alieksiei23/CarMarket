services:
  carmarket:
    build: .
    image: superimage
    container_name: supercontainer
    restart: always
    env_file:
      - .env
    links:
      - "postgres:postgres"
    networks:
      - dbnet
    volumes:
      - ./carmarket:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres


  postgres:
    image: postgres:17-alpine
    container_name: psgr
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    networks:
      - dbnet
    ports:
      - "5432:5432"

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  celery:
    build:
      context: .
    command: celery -A carmarket worker --loglevel=info
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    links:
      - "postgres:postgres"
    networks:
      - dbnet

